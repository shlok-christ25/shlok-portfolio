<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shlok Kishore | Filmmaker Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
margin:0;
background:#FAFAFA;
color:#111111;
line-height:1.6;
}

/* HEADER */

header{
text-align:center;
padding:100px 20px 80px;
border-bottom:1px solid #EAEAEA;
}

/* HERO IMAGE */

.profile{
width:100%;
max-width:850px;
height:420px;
object-fit:cover;
object-position:center;
border-radius:12px;
margin-bottom:30px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* NAME */

header h1{
font-size:52px;
font-weight:800;
margin:10px 0;
letter-spacing:1px;
}

header p{
color:#555;
max-width:720px;
margin:auto;
}

/* SECTIONS */

section{
padding:80px 10%;
}

h2{
font-size:32px;
margin-bottom:30px;
border-left:4px solid #C4A36B;
padding-left:12px;
}

/* FILMS */

.films{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:40px;
}

.film{
background:#FFFFFF;
padding:22px;
border-radius:12px;
border:1px solid #EAEAEA;
transition:0.3s;
opacity:0;
transform:translateY(40px);
}

.film.active{
opacity:1;
transform:translateY(0);
}

.film:hover{
transform:translateY(-6px);
box-shadow:0 12px 30px rgba(0,0,0,0.08);
}

/* VIDEO */

.video{
position:relative;
cursor:pointer;
border-radius:10px;
overflow:hidden;
transition:0.3s;
}

.video img{
width:100%;
display:block;
border-radius:10px;
}

/* overlay */

.video::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0);
transition:0.3s;
}

/* play icon */

.video::before{
content:"▶";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.6);
font-size:60px;
color:white;
opacity:0;
transition:0.3s;
z-index:2;
}

.video:hover::after{
background:rgba(0,0,0,0.35);
}

.video:hover::before{
opacity:1;
transform:translate(-50%,-50%) scale(1);
}

/* REMOVE OVERLAY WHEN PLAYING */

.video.playing::before,
.video.playing::after{
display:none;
}

.video iframe{
width:100%;
aspect-ratio:16/9;
border:none;
display:block;
}

/* SOCIAL MEDIA */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat{
background:#FFFFFF;
padding:25px;
text-align:center;
border-radius:10px;
border:1px solid #EAEAEA;
transition:0.3s;
}

.stat:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.social-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.social-grid img{
width:100%;
border-radius:10px;
transition:0.3s;
border:1px solid #EAEAEA;
}

.social-grid img:hover{
transform:scale(1.04);
}

/* SKILLS */

.skills{
display:flex;
flex-wrap:wrap;
gap:15px;
}

.skill{
background:#FFFFFF;
padding:10px 16px;
border-radius:8px;
border:1px solid #EAEAEA;
transition:0.3s;
font-weight:500;
}

.skill:hover{
border-color:#C4A36B;
}

/* CONTACT */

.contact{
font-size:18px;
line-height:2;
}

a{
color:#C4A36B;
text-decoration:none;
font-weight:500;
}

a:hover{
text-decoration:underline;
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
border-top:1px solid #EAEAEA;
margin-top:40px;
color:#777;
}

/* MOBILE */

@media(max-width:768px){

header h1{
font-size:36px;
}

.profile{
height:300px;
}

section{
padding:60px 7%;
}

}

/* SCROLL ANIMATION */

.reveal{
opacity:0;
transform:translateY(50px);
transition:all 0.8s ease;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>

</head>

<body>

<header>

<img src="profile(shlok).jpeg" class="profile">

<h1>Shlok Kishore</h1>

<p>Filmmaker • Storyteller • Media Enthusiast</p>

<p>
Filmmaker and media student specializing in storytelling, cinematography and digital media strategy.
</p>

</header>

<section class="reveal">

<h2>Featured Films</h2>

<div class="films">

<div class="film">

<h3>Bihari Mati Apna: Ganga Path Patna</h3>

<div class="video" onclick="playVideo(this,'Lv5qtAtIV7E')">
<img src="https://img.youtube.com/vi/Lv5qtAtIV7E/maxresdefault.jpg">
</div>

</div>

<div class="film">

<h3>Stop War Awareness</h3>

<div class="video" onclick="playVideo(this,'AWv2lH9_rAc')">
<img src="https://img.youtube.com/vi/AWv2lH9_rAc/maxresdefault.jpg">
</div>

</div>

<div class="film">

<h3>Blurred</h3>

<div class="video" onclick="playVideo(this,'Hte7B5KoKj0')">
<img src="https://img.youtube.com/vi/Hte7B5KoKj0/maxresdefault.jpg">
</div>

</div>

<div class="film">

<h3>Maya</h3>

<div class="video" onclick="playVideo(this,'-wm6WEyKdTA')">
<img src="https://img.youtube.com/vi/-wm6WEyKdTA/maxresdefault.jpg">
</div>

</div>

<div class="film">

<h3>Ek Laash Ki Casting</h3>

<div class="video" onclick="playVideo(this,'YAnR2zt4Qfo')">
<img src="https://img.youtube.com/vi/YAnR2zt4Qfo/maxresdefault.jpg">
</div>

</div>

</div>

</section>

<footer>

<p>© 2026 Shlok Kishore</p>

</footer>

<script>

function playVideo(element,videoId){

element.classList.add("playing");

element.innerHTML = `<iframe
src="https://www.youtube.com/embed/${videoId}?autoplay=1"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>`;

}

const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("active");
}
});
});

document.querySelectorAll(".reveal").forEach(el=>{
observer.observe(el);
});

document.querySelectorAll(".film").forEach(el=>{
observer.observe(el);
});

</script>

</body>

</html>
